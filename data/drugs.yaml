# 兽医知识库 — 药物数据
# 数据来源：Merck Veterinary Manual、Plumb's Veterinary Drug Handbook
# 剂量单位：mg/kg（除非另有说明），给药途径缩写：PO=口服, SC=皮下, IV=静脉, IM=肌肉, Top=外用
# species_dosing 格式：{"犬": {"dose": "...", "route": "...", "frequency": "..."}, "猫": {...}}

- id: drug_001
  name_zh: 阿莫西林-克拉维酸
  name_en: Amoxicillin-Clavulanate
  drug_class: 抗生素（β-内酰胺类）
  indications: ["尿路感染", "皮肤感染", "软组织感染", "牙周感染", "呼吸道感染"]
  contraindications: ["青霉素过敏", "严重肾功能不全（需调整剂量）"]
  side_effects: ["胃肠道反应（呕吐、腹泻）", "过敏反应", "肠道菌群失调"]
  species_dosing:
    犬: {dose: "12.5-25 mg/kg", route: PO, frequency: "q12h"}
    猫: {dose: "12.5-25 mg/kg", route: PO, frequency: "q12h"}

- id: drug_002
  name_zh: 恩诺沙星
  name_en: Enrofloxacin
  drug_class: 抗生素（氟喹诺酮类）
  indications: ["尿路感染", "皮肤感染", "呼吸道感染", "前列腺炎", "革兰阴性菌感染"]
  contraindications: ["幼龄动物（软骨毒性）", "猫高剂量（视网膜毒性）", "癫痫病史"]
  side_effects: ["胃肠道反应", "中枢神经系统兴奋", "幼畜软骨损伤", "猫视网膜病变（高剂量）"]
  species_dosing:
    犬: {dose: "5-20 mg/kg", route: PO/IV/SC, frequency: "q24h"}
    猫: {dose: "2.5-5 mg/kg", route: PO, frequency: "q24h（不超过5mg/kg）"}

- id: drug_003
  name_zh: 呋塞米
  name_en: Furosemide
  drug_class: 利尿剂（袢利尿剂）
  indications: ["充血性心力衰竭", "肺水肿", "胸腔积液", "急性肾损伤（促进利尿）", "高钙血症"]
  contraindications: ["脱水", "无尿", "低钾血症", "磺胺类过敏"]
  side_effects: ["脱水", "低钾血症", "低钠血症", "耳毒性（高剂量IV）", "肾前性氮质血症"]
  species_dosing:
    犬: {dose: "2-4 mg/kg", route: IV/IM/PO, frequency: "q8-12h（急性）；1-2 mg/kg q12-24h（维持）"}
    猫: {dose: "1-2 mg/kg", route: IV/IM/PO, frequency: "q12-24h"}

- id: drug_004
  name_zh: 泼尼松龙
  name_en: Prednisolone
  drug_class: 糖皮质激素
  indications: ["炎症性肠病", "过敏/特应性皮炎", "免疫介导性疾病", "猫哮喘", "肿瘤化疗辅助", "肾上腺皮质功能减退"]
  contraindications: ["真菌感染", "消化性溃疡", "未控制的糖尿病", "库欣综合征", "妊娠"]
  side_effects: ["多饮多尿多食", "胃肠道溃疡", "肌肉萎缩", "皮肤变薄", "免疫抑制", "医源性库欣"]
  species_dosing:
    犬: {dose: "0.5-1 mg/kg", route: PO, frequency: "q12h（抗炎）；0.1-0.25 mg/kg q48h（替代）"}
    猫: {dose: "1-2 mg/kg", route: PO, frequency: "q12h（抗炎，猫需更高剂量）"}

- id: drug_005
  name_zh: 胰岛素（甘精胰岛素）
  name_en: Insulin Glargine
  drug_class: 胰岛素（长效）
  indications: ["犬糖尿病（I型）", "猫糖尿病（II型，部分可缓解）", "糖尿病酮症酸中毒（急性期后）"]
  contraindications: ["低血糖", "胰岛素瘤"]
  side_effects: ["低血糖（最严重）", "注射部位反应", "体重增加", "Somogyi效应（反跳性高血糖）"]
  species_dosing:
    犬: {dose: "0.25-0.5 U/kg", route: SC, frequency: "q12h"}
    猫: {dose: "0.25-0.5 U/kg", route: SC, frequency: "q12h（猫对胰岛素敏感，需谨慎调整）"}

- id: drug_006
  name_zh: 匹莫苯丹
  name_en: Pimobendan
  drug_class: 正性肌力药（PDE-3抑制剂+钙增敏剂）
  indications: ["充血性心力衰竭（MMVD/DCM）", "扩张型心肌病", "二尖瓣关闭不全"]
  contraindications: ["肥厚型心肌病（HCM）", "主动脉瓣下狭窄", "心包填塞"]
  side_effects: ["心律失常", "食欲下降", "腹泻", "多动（正性肌力作用）"]
  species_dosing:
    犬: {dose: "0.2-0.3 mg/kg", route: PO, frequency: "q12h（餐前1h给药）"}
    猫: {dose: "0.1-0.25 mg/kg", route: PO, frequency: "q12h（猫数据有限）"}

- id: drug_007
  name_zh: 甲巯咪唑
  name_en: Methimazole
  drug_class: 抗甲状腺药物（硫脲类）
  indications: ["猫甲状腺功能亢进", "甲亢术前准备"]
  contraindications: ["严重肝功能不全", "严重肾功能不全", "妊娠（猫）"]
  side_effects: ["呕吐/厌食", "面部瘙痒（猫）", "血液学毒性（粒细胞减少）", "血小板减少", "肝毒性"]
  species_dosing:
    猫: {dose: "2.5 mg", route: PO/Transdermal, frequency: "q12h（猫用透皮耳膏更安全）"}
    犬: {dose: "不适用（犬甲亢极罕见）", route: "-", frequency: "-"}

- id: drug_008
  name_zh: 左甲状腺素钠
  name_en: Levothyroxine (T4)
  drug_class: 甲状腺激素替代
  indications: ["犬甲状腺功能减退"]
  contraindications: ["甲状腺功能亢进", "肾上腺皮质功能减退（需先补充糖皮质激素）", "未纠正的肾上腺功能不全"]
  side_effects: ["多动/焦虑", "多饮多尿", "心动过速", "体重下降（过量时）"]
  species_dosing:
    犬: {dose: "0.02 mg/kg", route: PO, frequency: "q12h"}
    猫: {dose: "不适用（猫甲减极罕见）", route: "-", frequency: "-"}

- id: drug_009
  name_zh: 奥美拉唑
  name_en: Omeprazole
  drug_class: 质子泵抑制剂（PPI）
  indications: ["胃酸相关疾病", "消化性溃疡", "NSAIDs胃保护", "胰腺炎辅助", "胃食管反流"]
  contraindications: ["严重肝功能不全（需减量）"]
  side_effects: ["胃肠道反应（少见）", "长期用可能影响钙吸收"]
  species_dosing:
    犬: {dose: "0.5-1 mg/kg", route: PO, frequency: "q24h（空腹给药）"}
    猫: {dose: "0.7-1 mg/kg", route: PO, frequency: "q24h（空腹给药）"}

- id: drug_010
  name_zh: 马罗匹坦
  name_en: Maropitant (Cerenia)
  drug_class: NK-1受体拮抗剂（止吐药）
  indications: ["急性呕吐", "晕动症（犬）", "化疗相关呕吐", "胰腺炎辅助止吐"]
  contraindications: ["16周龄以下犬", "胃肠道梗阻", "严重肝功能不全"]
  side_effects: ["注射部位疼痛（SC）", "流涎（犬）", "腹泻", "食欲下降"]
  species_dosing:
    犬: {dose: "1 mg/kg SC 或 2 mg/kg PO", route: "SC/PO", frequency: "q24h（不超过5天连续SC）"}
    猫: {dose: "1 mg/kg", route: "SC/PO", frequency: "q24h（猫标签外使用）"}

- id: drug_011
  name_zh: 曲马多
  name_en: Tramadol
  drug_class: 阿片类镇痛药（弱）
  indications: ["中度疼痛", "术后疼痛", "骨关节炎疼痛", "慢性疼痛管理"]
  contraindications: ["癫痫病史", "与MAO抑制剂合用", "严重肝肾功能不全"]
  side_effects: ["镇静", "恶心/呕吐", "便秘", "瞳孔缩小", "唾液分泌增加（猫）"]
  species_dosing:
    犬: {dose: "2-5 mg/kg", route: PO, frequency: "q8-12h"}
    猫: {dose: "2-4 mg/kg", route: PO, frequency: "q12h（猫代谢个体差异大）"}

- id: drug_012
  name_zh: 美洛昔康
  name_en: Meloxicam
  drug_class: NSAIDs（COX-2选择性抑制剂）
  indications: ["骨关节炎疼痛", "术后镇痛", "软组织损伤", "慢性炎症"]
  contraindications: ["脱水/低血容量", "消化道溃疡", "肾功能不全", "肝功能不全", "与其他NSAIDs或糖皮质激素合用"]
  side_effects: ["胃肠道溃疡/呕吐/腹泻", "肾毒性", "肝毒性", "凝血障碍"]
  species_dosing:
    犬: {dose: "0.1 mg/kg", route: PO, frequency: "q24h（首剂可0.2 mg/kg）"}
    猫: {dose: "0.05 mg/kg", route: "PO/SC", frequency: "q24h（猫单次SC注射后转为口服，不超过3天）"}

- id: drug_013
  name_zh: 多西环素
  name_en: Doxycycline
  drug_class: 抗生素（四环素类）
  indications: ["立克次体病（埃立克体、落基山斑疹热）", "支原体/衣原体感染", "莱姆病", "钩端螺旋体病", "心丝虫辅助"]
  contraindications: ["妊娠", "8周龄以下幼畜（牙齿着色风险）", "严重肝功能不全"]
  side_effects: ["食管狭窄（猫，给药后需冲水）", "呕吐/腹泻", "光敏反应", "肝毒性（罕见）"]
  species_dosing:
    犬: {dose: "5-10 mg/kg", route: PO, frequency: "q12h（首剂加倍）"}
    猫: {dose: "5 mg/kg", route: PO, frequency: "q12h（给药后冲水防食管狭窄）"}

- id: drug_014
  name_zh: 甲硝唑
  name_en: Metronidazole
  drug_class: 抗生素/抗原虫（硝基咪唑类）
  indications: ["厌氧菌感染", "贾第鞭毛虫", "炎症性肠病（免疫调节）", "肝性脑病", "坏死性肠炎"]
  contraindications: ["妊娠（早期）", "严重肝病", "与华法林合用"]
  side_effects: ["神经毒性（高剂量，共济失调/眼球震颤）", "食欲下降", "呕吐", "肝毒性（高剂量）"]
  species_dosing:
    犬: {dose: "10-15 mg/kg", route: PO, frequency: "q12h"}
    猫: {dose: "10-15 mg/kg", route: PO, frequency: "q12h（猫更易出现神经毒性）"}

- id: drug_015
  name_zh: 地高辛
  name_en: Digoxin
  drug_class: 强心苷类正性肌力药
  indications: ["充血性心力衰竭", "心房颤动（心室率控制）", "室上性心动过速"]
  contraindications: ["心室颤动", "肥厚型心肌病", "二度/三度房室传导阻滞", "低钾血症", "肾功能不全（需减量）"]
  side_effects: ["心律失常（治疗窗窄）", "厌食/呕吐/腹泻", "嗜睡", "视觉障碍"]
  species_dosing:
    犬: {dose: "0.0025-0.005 mg/kg", route: PO, frequency: "q12h（监测血药浓度）"}
    猫: {dose: "0.001-0.002 mg/kg", route: PO, frequency: "q24-48h（猫极敏感）"}

- id: drug_016
  name_zh: 苯巴比妥
  name_en: Phenobarbital
  drug_class: 抗癫痫药（巴比妥类）
  indications: ["癫痫（一线用药）", "特发性癫痫", "癫痫持续状态（IV地西泮控制后维持）"]
  contraindications: ["严重肝病", "严重呼吸抑制"]
  side_effects: ["镇静/共济失调（初期）", "多饮多尿多食", "肝毒性（长期）", "血液学毒性（罕见）"]
  species_dosing:
    犬: {dose: "2-5 mg/kg", route: PO, frequency: "q12h（需监测血药浓度）"}
    猫: {dose: "2-3 mg/kg", route: PO, frequency: "q12h"}

- id: drug_017
  name_zh: 溴化钾
  name_en: Potassium Bromide
  drug_class: 抗癫痫药
  indications: ["癫痫（单药或联合苯巴比妥）", "苯巴比妥不耐受的癫痫病例"]
  contraindications: ["肾功能不全", "对溴化物过敏"]
  side_effects: ["镇静/共济失调", "多饮多尿", "胰腺炎（犬）", "皮肤疹"]
  species_dosing:
    犬: {dose: "30-40 mg/kg", route: PO, frequency: "q24h（负荷剂量可加倍）"}
    猫: {dose: "不适用（猫溴化物可致致命性肺炎）", route: "-", frequency: "-"}

- id: drug_018
  name_zh: 阿莫西林
  name_en: Amoxicillin
  drug_class: 抗生素（β-内酰胺类，氨基青霉素）
  indications: ["尿路感染", "皮肤感染", "呼吸道感染", "牙科感染", "软组织感染"]
  contraindications: ["青霉素过敏"]
  side_effects: ["胃肠道反应", "过敏反应", "肠道菌群失调"]
  species_dosing:
    犬: {dose: "11-22 mg/kg", route: PO, frequency: "q12h"}
    猫: {dose: "11-22 mg/kg", route: PO, frequency: "q12h"}

- id: drug_019
  name_zh: 头孢氨苄
  name_en: Cefalexin
  drug_class: 抗生素（第一代头孢菌素）
  indications: ["皮肤感染", "尿路感染", "软组织感染", "骨关节感染"]
  contraindications: ["青霉素/头孢菌素过敏", "严重肾功能不全（需调整剂量）"]
  side_effects: ["胃肠道反应", "过敏反应", "注射部位疼痛（IM）"]
  species_dosing:
    犬: {dose: "22-30 mg/kg", route: PO, frequency: "q12h"}
    猫: {dose: "22-30 mg/kg", route: PO, frequency: "q12h"}

- id: drug_020
  name_zh: 氟苯尼考
  name_en: Florfenicol
  drug_class: 抗生素（苯丙醇类）
  indications: ["呼吸道感染（尤其牛呼吸道病）", "皮肤感染", "多药耐药菌感染"]
  contraindications: ["妊娠", "疫苗接种期间", "家禽（禁用）"]
  side_effects: ["胃肠道反应", "骨髓抑制（罕见）", "注射部位反应"]
  species_dosing:
    犬: {dose: "20 mg/kg", route: PO/SC, frequency: "q8-12h"}
    猫: {dose: "标签外使用，数据有限", route: PO, frequency: "谨慎使用"}

- id: drug_021
  name_zh: 特比萘芬
  name_en: Terbinafine
  drug_class: 抗真菌药（丙烯胺类）
  indications: ["皮肤真菌病（癣菌）", "甲真菌病", "马拉色菌感染"]
  contraindications: ["严重肝功能不全"]
  side_effects: ["胃肠道反应", "肝酶升高", "味觉障碍（罕见）"]
  species_dosing:
    犬: {dose: "30 mg/kg", route: PO, frequency: "q24h"}
    猫: {dose: "20-40 mg/kg", route: PO, frequency: "q24h（猫对疗程要求更长）"}

- id: drug_022
  name_zh: 伊曲康唑
  name_en: Itraconazole
  drug_class: 抗真菌药（三唑类）
  indications: ["深部真菌病（组织胞浆菌、球孢子菌、隐球菌）", "皮肤真菌病", "曲霉菌病"]
  contraindications: ["严重肝病", "妊娠", "与某些心脏药物合用"]
  side_effects: ["肝毒性", "胃肠道反应", "皮肤溃疡（犬脉冲疗法时）", "食欲下降"]
  species_dosing:
    犬: {dose: "5-10 mg/kg", route: PO, frequency: "q12-24h（与食物同服）"}
    猫: {dose: "5-10 mg/kg", route: PO, frequency: "q24h（液体剂型优于胶囊）"}

- id: drug_023
  name_zh: 多拉西泮（安定）
  name_en: Diazepam
  drug_class: 苯二氮卓类
  indications: ["癫痫持续状态（IV）", "焦虑/行为问题", "术前镇静", "骨骼肌痉挛", "猫特发性膀胱炎（急性期）"]
  contraindications: ["严重肝功能不全（猫口服可致致命性肝坏死）", "重症肌无力", "严重呼吸抑制"]
  side_effects: ["镇静/共济失调", "肝毒性（猫口服）", "兴奋性矛盾反应（猫）", "呼吸抑制（IV）"]
  species_dosing:
    犬: {dose: "0.5-2 mg/kg IV（癫痫持续状态）；0.2-0.5 mg/kg PO", route: "IV/PO", frequency: "按需"}
    猫: {dose: "0.5-1 mg/kg IV（癫痫持续状态）", route: "IV", frequency: "按需（避免口服，肝毒性风险）"}

- id: drug_024
  name_zh: 阿替美唑
  name_en: Atipamezole
  drug_class: α-2肾上腺素能受体拮抗剂（右美托咪定拮抗剂）
  indications: ["右美托咪定/美托咪定麻醉后逆转", "镇静逆转"]
  contraindications: ["妊娠", "心脏病（相对）"]
  side_effects: ["短暂性低血压", "呕吐", "兴奋/躁动", "心动过速"]
  species_dosing:
    犬: {dose: "与右美托咪定等量（mg）", route: IM, frequency: "单次"}
    猫: {dose: "与右美托咪定等量（mg）", route: IM, frequency: "单次"}

- id: drug_025
  name_zh: 纳洛酮
  name_en: Naloxone
  drug_class: 阿片受体拮抗剂
  indications: ["阿片类药物过量逆转", "术后阿片类药物残余效应"]
  contraindications: ["阿片类药物依赖动物（可诱发戒断）"]
  side_effects: ["疼痛反弹", "心动过速", "兴奋/躁动", "肺水肿（罕见，快速IV）"]
  species_dosing:
    犬: {dose: "0.01-0.04 mg/kg", route: IV/IM/SC, frequency: "可重复（作用时间短于阿片类）"}
    猫: {dose: "0.01-0.04 mg/kg", route: IV/IM/SC, frequency: "可重复"}

- id: drug_026
  name_zh: 维生素K1
  name_en: Phytonadione (Vitamin K1)
  drug_class: 维生素/凝血因子合成辅助
  indications: ["香豆素类灭鼠药中毒", "华法林过量", "严重肝病凝血障碍", "新生畜维生素K缺乏"]
  contraindications: ["无特殊绝对禁忌"]
  side_effects: ["过敏反应（IV）", "注射部位反应", "高铁血红蛋白血症（极高剂量）"]
  species_dosing:
    犬: {dose: "2-5 mg/kg", route: PO/SC, frequency: "q12-24h（随脂餐口服）；疗程2-4周（灭鼠药中毒）"}
    猫: {dose: "2-5 mg/kg", route: PO/SC, frequency: "q12-24h（猫对灭鼠药更敏感）"}

- id: drug_027
  name_zh: 硫糖铝
  name_en: Sucralfate
  drug_class: 胃黏膜保护剂
  indications: ["消化道溃疡", "NSAIDs相关胃损伤", "尿毒症胃炎", "食管炎"]
  contraindications: ["严重肾功能不全（铝蓄积风险）"]

  contraindications: ["MAO抑制剂合用", "癫痫患犬慎用"]
  side_effects: ["镇静", "恶心", "便秘", "猫可能产生兴奋而非镇静"]
  species_dosing: "犬：2-5mg/kg q8-12h；猫：效果不确切，2-4mg/kg q12h"

- id: drug_054
  name_zh: 托赛米
  name_en: Torasemide
  definition: 袢利尿剂，效力为呋塞米的10倍，半衰期更长，用于心衰利尿。
  drug_class: 利尿剂
  indications: ["心力衰竭", "其他需强利尿的情况"]
  contraindications: ["低血容量", "低钾血症", "肝昏迷"]
  side_effects: ["脱水", "电解质紊乱", "肾前性氮质血症"]
  species_dosing: "犬：0.1-0.3mg/kg q24h（口服）；猫：0.1-0.2mg/kg q24h"

- id: drug_055
  name_zh: 贝那普利
  name_en: Benazepril
  definition: ACE抑制剂，降低肾小球内压，减少蛋白尿，用于CKD和心衰。
  drug_class: ACE抑制剂
  indications: ["CKD蛋白尿", "心力衰竭", "高血压"]
  contraindications: ["双侧肾动脉狭窄", "妊娠"]
  side_effects: ["低血压", "高钾血症", "肾功能恶化"]
  species_dosing: "犬猫：0.25-0.5mg/kg q24h"

- id: drug_056
  name_zh: 氯吡格雷
  name_en: Clopidogrel
  definition: 抗血小板药物，抑制ADP受体，减少血栓形成。猫HCM合并血栓风险时使用。
  drug_class: 抗血小板药
  indications: ["血栓预防(猫HCM)", "动脉血栓栓塞"]
  contraindications: ["活动性出血", "严重肝病"]
  side_effects: ["出血倾向", "胃肠道不适"]
  species_dosing: "猫：18.75mg/cat q24h；犬：1-2mg/kg q24h"

- id: drug_057
  name_zh: 阿替帕唑
  name_en: Atipamezole
  definition: α2-肾上腺素能受体拮抗剂，用于逆转美托咪定/右美托咪定的镇静作用。
  drug_class: 拮抗剂
  indications: ["逆转α2激动剂镇静"]
  contraindications: []
  side_effects: ["一过性低血压", "呕吐", "兴奋"]
  species_dosing: "犬猫：给予美托咪定等量（mg:mg）IM"

- id: drug_058
  name_zh: 氟西汀
  name_en: Fluoxetine
  definition: SSRI抗抑郁药，用于犬猫的行为问题（分离焦虑、强迫行为）和喷尿标记。
  drug_class: 行为调节药
  indications: ["分离焦虑", "强迫行为", "猫喷尿标记"]
  contraindications: ["MAO抑制剂合用", "癫痫病史"]
  side_effects: ["食欲下降", "镇静", "胃肠道不适"]
  species_dosing: "犬：1-2mg/kg q24h；猫：0.5-1mg/kg q24h"

- id: drug_059
  name_zh: 两性霉素B
  name_en: Amphotericin B
  definition: 多烯类抗真菌药，用于全身性真菌感染（组织胞浆菌、球孢子菌等）。脂质体剂型肾毒性较低。
  drug_class: 抗真菌药
  indications: ["全身性真菌感染"]
  contraindications: ["严重肾功能不全(普通剂型)"]
  side_effects: ["肾毒性(普通剂型)", "输液反应", "低钾血症"]
  species_dosing: "犬：普通剂型0.25-0.5mg/kg IV 隔日；脂质体剂型1-3mg/kg IV 每周2-3次"

- id: drug_060
  name_zh: 伊曲康唑
  name_en: Itraconazole
  definition: 三唑类抗真菌药，用于皮肤真菌病和全身性真菌感染。猫口服溶液吸收优于胶囊。
  drug_class: 抗真菌药
  indications: ["皮肤真菌病", "全身性真菌感染"]
  contraindications: ["严重肝病", "妊娠"]
  side_effects: ["肝毒性", "食欲下降", "呕吐"]
  species_dosing: "犬：5-10mg/kg q24h；猫：5-10mg/kg q24h（口服液）"


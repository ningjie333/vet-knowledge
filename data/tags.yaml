# ── 急诊分级（四级临床决策体系）──
- id: em_red
  name_zh: 红色
  name_en: Red - Critical
  tag_group: emergency
  emergency_level: red
  clinical_action: 立即心肺复苏或生命支持 (Resuscitative)
  textbook_logic: 生命体征极不稳定，随时可能进展至心跳呼吸骤停，需争分夺秒干预
  typical_scenario: 心跳呼吸骤停、严重气道梗阻、失血性休克、濒死状态
  color: "#D32F2F"

- id: em_orange
  name_zh: 橙色
  name_en: Orange - Emergent
  tag_group: emergency
  emergency_level: orange
  clinical_action: 15 分钟内介入，重点监测核心生理指标
  textbook_logic: 生命体征不稳定但尚未至濒死，快速干预可防止恶化至红色等级
  typical_scenario: 呼吸困难、重度创伤、严重呕吐/腹泻伴脱水、抽搐持续状态
  color: "#F57C00"

- id: em_yellow
  name_zh: 黄色
  name_en: Yellow - Urgent
  tag_group: emergency
  emergency_level: yellow
  clinical_action: 60 分钟内介入，评估代偿状态
  textbook_logic: 机体尚能代偿，但病因持续存在将导致失代偿，需尽快明确诊断
  typical_scenario: 反复呕吐/腹泻、轻度脱水、间歇性跛行、不明原因发热
  color: "#FBC02D"

- id: em_green
  name_zh: 绿色
  name_en: Green - Non-Urgent
  tag_group: emergency
  emergency_level: green
  clinical_action: 常规检查，侧重病史采集与病理分析
  textbook_logic: 病情稳定，无急性生命威胁，可按计划进行系统评估
  typical_scenario: 皮肤瘙痒、疫苗接种、常规体检、慢性疾病复诊
  color: "#388E3C"


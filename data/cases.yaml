# 兽医知识库 — 教学病例
# 每个病例包含完整临床推理过程，用于学习模块和游戏模式
# difficulty: basic / intermediate / advanced

- id: case_001
  title: "3岁绝育雌性金毛猎犬 — 急性呕吐与祈祷姿势"
  species: 犬
  breed: 金毛猎犬
  age: 3
  weight: 28
  chief_complaint: "呕吐24小时，弓背不愿活动，呈祈祷姿势"
  history: "昨晚偷吃了一整盘红烧肉。今早开始呕吐，呕吐物为未消化食物→黄色胆汁样。精神差，不愿走动，弓背，腹部触诊敏感。已绝育，定期免疫驱虫，既往体健。"
  physical_exam: "T 39.5°C，HR 120bpm，RR 32次/分，脱水约7%。腹部触诊前腹敏感，呈祈祷姿势（前肢趴地后肢站立）。肠鸣音减弱。黏膜颜色正常，CRT 2秒。"
  lab_results: "cPLI: 850 μg/L（参考≤200）。CBC: WBC 18.5×10³/μL（参考6-17），中性粒85%。生化: ALT 180 U/L（轻度↑），ALP 250 U/L（轻度↑），BUN 35 mg/dL（轻度↑，脱水），GLU 160 mg/dL（轻度↑，应激）。"
  imaging: "腹部超声：胰腺弥漫性增大，周围脂肪回声增强（'毛玻璃样'改变），无游离液体，无异物征象。"
  diagnosis: "急性胰腺炎（高脂饮食诱发）"
  treatment: "1. 乳酸林格液 10 ml/kg/h IV 纠正脱水；2. 马罗匹坦 1 mg/kg SC q24h 止吐；3. 曲马多 3 mg/kg PO q8h 镇痛；4. 奥美拉唑 1 mg/kg PO q24h 胃保护；5. 禁食48-72h后逐步引入低脂饮食。"
  outcome: "治疗48h后呕吐停止，72h后开始进食低脂罐头，第5天出院。建议长期低脂饮食管理。"
  learning_points: "① 祈祷姿势（prayer position）是犬胰腺炎的特征性表现；② cPLI>400 μg/L对犬胰腺炎敏感性82%、特异性95%；③ 高脂饮食是犬胰腺炎最常见诱因；④ 治疗核心是积极液体复苏+止吐+镇痛+禁食，不推荐常规使用抗生素。"
  difficulty: basic

- id: case_002
  title: "8岁未绝育雌性家短毛猫 — 多饮多尿与体重下降"
  species: 猫
  breed: 家短毛猫
  age: 8
  weight: 3.2
  chief_complaint: "近2个月多饮多尿，食欲增加但体重下降"
  history: "主人发现猫砂结块明显增多，每天需清理2-3次（之前1次）。食欲旺盛但体重从4.1kg降至3.2kg。活动量略减，偶有呕吐（每周1-2次）。未绝育，室内饲养，未用任何药物。"
  physical_exam: "T 38.8°C，HR 220bpm（心动过速），RR 28次/分，体况评分3/9。双侧甲状腺可触及轻度增大（右侧更明显）。肌肉量减少，尤其后肢。心肺听诊：心音增强，无杂音。腹部触诊无异常。"
  lab_results: "总T4: 8.5 μg/dL（参考0.8-4.0，显著↑）。CBC: 正常范围。生化: ALT 150 U/L（轻度↑，甲亢继发），BUN 28 mg/dL，CREA 1.8 mg/dL，GLU 180 mg/dL（轻度↑，应激性）。尿比重 1.025（偏低，排除DKA）。"
  imaging: "超声心动图：左室游离壁轻度增厚（5.8mm），左房轻度扩大，收缩功能正常。腹部超声：双侧甲状腺增大，右侧3cm×1.5cm，回声不均。"
  diagnosis: "猫甲状腺功能亢进（双侧甲状腺增生），继发早期心肌肥厚"
  treatment: "1. 甲巯咪唑透皮耳膏 2.5 mg q12h（首选透皮剂型减少胃肠道副作用）；2. 4周后复查T4调整剂量；3. 每6个月复查超声心动图监测心肌变化。"
  outcome: "用药4周后T4降至3.2 μg/dL，HR降至180bpm，体重回升至3.6kg。主人报告饮尿量明显减少。"
  learning_points: "① 老年猫多饮多尿+多食+体重下降=甲亢三联征，必须查T4；② 甲亢可继发HCM，需基线超声心动图；③ 透皮甲巯咪唑耳膏是猫的首选给药途径（避免口服胃肠道副作用）；④ 甲亢猫的ALT↑通常是继发性，不需保肝治疗。"
  difficulty: basic

- id: case_003
  title: "5岁雄性绝育杜宾犬 — 运动不耐受与晕厥"
  species: 犬
  breed: 杜宾犬
  age: 5
  weight: 35
  chief_complaint: "近1个月运动不耐受，上周晕厥1次"
  history: "近1个月不愿散步，走500米即喘。上周突然倒地意识丧失约30秒，自行恢复。无抽搐，无大小便失禁。食欲正常，无咳嗽。杜宾犬DCM高发品种。"
  physical_exam: "T 38.5°C，HR 160bpm（心动过速），RR 36次/分。心音低沉，可闻及II/VI级收缩期杂音（心尖部）。心律不齐，脉搏短绌。肺部听诊清晰。无腹水。"
  lab_results: "BNP↑↑（提示心室扩张）。CBC: 正常。生化: ALT 80 U/L（正常），BUN 18 mg/dL，CREA 1.2 mg/dL（肾功能正常）。血气: 轻度代谢性碱中毒（代偿性）。"
  imaging: "超声心动图: 左室舒张内径（LVIDd）65mm（参考<55mm，显著扩张），FS% 18%（参考25-45%，显著降低），左房扩大（LA/Ao 2.0），整体收缩功能严重降低。未见瓣膜增厚/脱垂。"
  diagnosis: "扩张型心肌病（DCM），合并房颤"
  treatment: "1. 呋塞米 2 mg/kg PO q12h 减轻心脏负荷；2. 匹莫苯丹 0.25 mg/kg PO q12h 增强收缩力；3. 地高辛 0.003 mg/kg PO q12h 控制房颤心室率（监测血药浓度）；4. 严格限制运动。"
  outcome: "2周后复查：HR 130bpm，心律仍不齐但心室率控制改善。1个月后晕厥未再发作，可缓慢散步15分钟。告知预后差，中位生存期3-6个月。"
  learning_points: "① 杜宾犬是DCM最高发品种，5岁公犬+运动不耐受+晕厥需高度怀疑；② 超声心动图是确诊金标准：LVIDd↑+FS%↓=DCM；③ 房颤是DCM常见并发症，地高辛用于心室率控制；④ 匹莫苯丹+呋塞米是DCM标准治疗方案；⑤ DCM预后差，需与主人充分沟通。"
  difficulty: advanced

- id: case_004
  title: "1岁未免疫雄性拉布拉多犬 — 血性腹泻与白细胞危机"
  species: 犬
  breed: 拉布拉多犬
  age: 1
  weight: 22
  chief_complaint: "严重血便2天，呕吐，精神极差"
  history: "3天前开始食欲下降，2天前出现严重血性腹泻（番茄酱样），频繁呕吐（>10次/天），完全拒食。未完成免疫程序（仅接种1次五联，未完成加强）。刚从宠物店购回2周。"
  physical_exam: "T 39.8°C，HR 180bpm，RR 40次/分，脱水约10%。精神沉郁，四肢冰凉。黏膜苍白，CRT 3秒。腹部触诊敏感，肠管增厚感。"
  lab_results: "CPV SNAP: 阳性。CBC: WBC 800/μL（参考6-17000，极度↓），淋巴细胞200/μL，中性粒500/μL（泛白细胞减少）。HCT 28%（↓）。PLT 45×10³/μL（↓）。生化: GLU 55 mg/dL（低血糖），TP 4.2 g/dL（↓），BUN 45 mg/dL（↑，脱水+肠道出血吸收）。"
  imaging: "腹部X线: 肠管普遍扩张，肠壁增厚，无异物征。腹部超声: 肠壁层次模糊，肠系膜淋巴结增大，无套叠征。"
  diagnosis: "犬细小病毒病（CPV-2），严重泛白细胞减少"
  treatment: "1. 乳酸林格液+5%葡萄糖 15 ml/kg/h IV（纠正脱水+低血糖）；2. 阿莫西林-克拉维酸 20 mg/kg IV q12h（预防菌血症）；3. 马罗匹坦 1 mg/kg SC q24h 止吐；4. 奥美拉唑 1 mg/kg IV q24h 胃保护；5. 严格隔离护理。"
  outcome: "治疗第3天WBC开始回升（2500/μL），第5天WBC 8000/μL，血便减少。第7天开始进食，第10天出院。告知2周内仍排毒，需严格隔离。"
  learning_points: "① 未免疫幼犬+出血性肠炎+白细胞↓↓=细小，SNAP快速确诊；② 治疗核心是积极液体复苏（不是抗病毒！）；③ 白细胞<2000时菌血症风险极高，必须用抗生素；④ 低血糖是幼犬细小常见致死原因，需监测补充；⑤ 未治疗死亡率91%，积极治疗存活率80-90%。"
  difficulty: intermediate

- id: case_005
  title: "12岁绝育雌性贵宾犬 — 咳嗽与呼吸困难"
  species: 犬
  breed: 贵宾犬
  age: 12
  weight: 4.5
  chief_complaint: "阵发性咳嗽2周，近2天呼吸困难加重"
  history: "2周前开始阵发性干咳，运动后加重，夜间明显。近2天出现呼吸困难，张口呼吸，不能平卧。贵宾犬气管塌陷高发品种。既往有轻度心脏杂音（未进一步检查）。"
  physical_exam: "T 39.0°C，HR 140bpm，RR 48次/分，吸气性呼吸困难。特征性'鹅叫样'阵发性咳嗽。听诊：吸气相气管喘鸣音，心尖部II/VI级收缩期杂音。发绀（黏膜发紫）。"
  lab_results: "CBC: 正常范围。生化: 基本正常，BUN 22 mg/dL，CREA 1.0 mg/dL。血气: 低氧血症（pO₂ 65 mmHg），轻度高碳酸血症。"
  imaging: "胸部X线: 颈段气管背侧扁平（吸气相），心影轻度增大（左房扩大），肺野清晰（无肺水肿/肺炎）。荧光透视: 吸气时颈段气管腔狭窄>50%。"
  diagnosis: "气管塌陷（II-III级），合并早期二尖瓣关闭不全（MMVD B2期）"
  treatment: "1. 吸氧（氧笼，FiO₂ 40%）；2. 布托啡诺 0.2 mg/kg IV 镇静+止咳（减少气管刺激）；3. 泼尼松龙 0.5 mg/kg PO q12h 短期减轻气管水肿；4. 曲马多 3 mg/kg PO q8h 止咳；5. 严格避免兴奋/运动，使用胸背带替代项圈。"
  outcome: "24h后呼吸困难改善，可平卧。3天后咳嗽频率减少50%。出院后长期管理：胸背带+止咳药+控制体重。告知气管塌陷无法根治，严重时需气管支架。"
  learning_points: "① 小型犬+鹅叫样咳嗽=气管塌陷，荧光透视是确诊金标准；② 气管塌陷分级：I级<25%，II级25-50%，III级50-75%，IV级>75%；③ 急性发作期核心治疗：镇静+止咳+吸氧（不是抗生素！）；④ 需排除合并心衰（老年犬常合并MMVD）；⑤ 胸背带替代项圈是长期管理基础。"
  difficulty: intermediate

- id: case_006
  title: "6岁绝育雌性家短毛猫 — 后肢突然瘫痪"
  species: 猫
  breed: 家短毛猫
  age: 6
  weight: 5.5
  chief_complaint: "突然后肢瘫痪，惨叫"
  history: "今早突然惨叫，后肢无法站立拖行。无外伤史。既往体健。主人发现猫最近1个月活动量略减，但未就医。"
  physical_exam: "T 37.2°C（偏低），HR 190bpm，RR 32次/分。后肢完全瘫痪，痛觉消失。后肢皮温低，股动脉搏动消失（双侧）。后肢脚趾发绀。心肺听诊：心律不齐，偶发早搏。"
  lab_results: "CK↑↑（肌肉缺血损伤）。CBC: 正常。生化: ALT 120 U/L（轻度↑），BUN 30 mg/dL，CREA 2.0 mg/dL（轻度↑）。凝血: PT/APTT正常。"
  imaging: "超声心动图: 左室游离壁增厚（7.2mm），左房显著扩大（LA/Ao 2.2），左心耳内可见回声团（血栓）。多普勒: 后肢股动脉无血流信号。"
  diagnosis: "猫肥厚型心肌病（HCM）合并动脉血栓（鞍血栓）"
  treatment: "1. 丁丙诺啡 0.02 mg/kg IV q6h 镇痛（鞍血栓极度疼痛）；2. 低分子肝素 100 U/kg SC q12h 抗凝；3. 氯吡格雷 18.75 mg PO q24h 抗血小板；4. 吸氧；5. 告知预后极差。"
  outcome: "48h后后肢仍瘫痪，痛觉部分恢复。主人选择安乐死。尸检确认HCM+主动脉鞍血栓。"
  learning_points: "① 猫突发后肢瘫痪+皮温低+无脉搏=动脉血栓，必须排查HCM；② HCM是猫最常见心脏病，左房扩大是血栓形成高危因素；③ 鞍血栓预后极差，即使取栓/抗凝，复发率和死亡率极高；④ 早期识别HCM（定期超声）是预防血栓的关键；⑤ 镇痛是血栓治疗的核心（疼痛可致休克死亡）。"
  difficulty: advanced

- id: case_007
  title: "4岁绝育雄性德国牧羊犬 — 腹胀与干呕"
  species: 犬
  breed: 德国牧羊犬
  age: 4
  weight: 38
  chief_complaint: "饭后2小时突发腹胀，干呕但吐不出"
  history: "晚饭后2小时突然出现腹部膨隆，频繁干呕但无法吐出任何物质。烦躁不安，无法卧下。德牧是GDV高发品种。昨晚饭后有剧烈运动。"
  physical_exam: "T 38.0°C，HR 180bpm（心动过速），RR 50次/分，休克状态。腹部极度膨隆，叩诊鼓音。黏膜苍白发灰，CRT 4秒。无法站立。"
  lab_results: "采血困难（休克）。床旁: 乳酸8.5 mmol/L（显著↑，正常<2），HCT 55%（血液浓缩）。"
  imaging: "腹部X线（右侧位）: 胃显著扩张，幽门向右移位，胃内大量气体，胃壁可见分隔征（'双泡征'或'咖啡豆征'）=GDV确诊。"
  diagnosis: "胃扩张-扭转（GDV），休克"
  treatment: "1. 双静脉通路，乳酸林格液 20 ml/kg 快速推注×2（液体复苏）；2. 紧急胃穿刺减压（18G针头经腹壁刺入胃）；3. 术前准备（血常规/凝血/交叉配血）；4. 紧急开腹探查+胃复位+胃固定术（Gastropexy）；5. 如胃壁坏死需胃部分切除。"
  outcome: "术中发现胃顺时针扭转270°，胃壁局部缺血但未坏死。行胃复位+胃固定术。术后48h出现室性心律失常（地高辛治疗），第5天出院。告知GDV复发率（未做胃固定>50%，胃固定后<5%）。"
  learning_points: "① 大型深胸犬+饭后剧烈运动+腹胀+干呕=GDV，不能等X线确认再治疗；② 治疗顺序：液体复苏→胃减压→手术（不是先拍片！）；③ 胃固定术是预防复发的关键；④ 术后心律失常是常见致死并发症；⑤ 术前死亡率15-30%，胃壁坏死切除后死亡率>50%。"
  difficulty: advanced

- id: case_008
  title: "10岁绝育雌性可卡犬 — 多饮多尿与对称性脱毛"
  species: 犬
  breed: 可卡犬
  age: 10
  weight: 12
  chief_complaint: "近3个月多饮多尿，对称性脱毛，腹部膨隆"
  history: "3个月来饮水量明显增加（每天约2L，正常约0.5L）。对称性脱毛（躯干为主），腹部逐渐膨隆。多食，但肌肉量减少。活动量下降。"
  physical_exam: "T 38.5°C，HR 90bpm，RR 20次/分。对称性脱毛（躯干、腹部），皮肤变薄可见血管。腹部膨隆（'壶腹状'），肝缘超出肋弓3cm。肌肉萎缩（四肢、腰部）。"
  lab_results: "ALP 1850 U/L（参考23-212，显著↑↑↑，类固醇诱导型）。ALT 280 U/L（↑）。胆固醇 450 mg/dL（↑↑）。GLU 165 mg/dL（轻度↑）。尿比重 1.008（低）。尿糖阴性。Na/K比 28:1（<27提示Addison，本例排除）。"
  imaging: "腹部超声: 双侧肾上腺增大（右侧4.5mm，左侧3.8mm），肝脏增大回声均匀。腹部X线: 肝肿大。"
  diagnosis: "库欣综合征（垂体依赖性，PDH）"
  treatment: "1. 曲司氯胺（Trilostane）2 mg/kg PO q12h（抑制皮质醇合成）；2. 2周后复查ACTH刺激试验调整剂量；3. 定期监测电解质+ACTH刺激试验。"
  outcome: "用药4周后饮尿量明显减少，ALP降至600 U/L。3个月后皮肤开始再生毛发。告知需终身用药，定期监测。"
  learning_points: "① 犬库欣三联征：多饮多尿多食+对称性脱毛+壶腹状腹部；② ALP显著↑↑（类固醇诱导型）是库欣最敏感的筛查指标；③ ACTH刺激试验是确诊金标准；④ 曲司氯胺是PDH一线治疗药物；⑤ 需与医源性库欣鉴别（是否有糖皮质激素用药史）。"
  difficulty: intermediate

- id: case_009
  title: "2岁未绝育雌性家短毛猫 — 发热与腹水"
  species: 猫
  breed: 家短毛猫
  age: 2
  weight: 2.8
  chief_complaint: "持续发热3周，腹部逐渐膨隆"
  history: "3周来持续发热（39.5-40.5°C），抗生素治疗无效。近1周发现腹部膨隆。食欲下降，体重减轻。多猫家庭（4只猫），1周前另一只猫死亡（类似症状）。"
  physical_exam: "T 40.2°C，HR 200bpm，RR 36次/分。体况评分2/9。腹部膨隆，波动感（积液）。黏膜轻度黄染。浅表淋巴结轻度增大。"
  lab_results: "总蛋白 9.2 g/dL（↑），白蛋白 2.0 g/dL（↓），球蛋白 7.2 g/dL（↑↑），A:G比 0.28（<0.4高度提示FIP）。FIP抗体滴度 1:3200（高滴度）。HCT 22%（非再生性贫血）。"
  imaging: "腹部超声: 大量腹腔积液，肠系膜淋巴结增大，肾脏表面不规则（干性FIP肾周病变）。胸部X线: 无胸腔积液（排除湿性FIP胸水型）。"
  diagnosis: "猫传染性腹膜炎（FIP，干性/非渗出性为主）"
  treatment: "1. 泼尼松龙 2 mg/kg PO q24h 免疫抑制；2. 腹腔穿刺放液减压；3. 支持治疗（营养支持+补液）；4. 告知传统方案预后极差。"
  outcome: "泼尼松龙治疗后体温下降至39.0°C，食欲改善。但3周后再次恶化，主人选择安乐死。"
  learning_points: "① 年轻猫+持续发热+高球蛋白/低白蛋白（A:G<0.4）+FIP高滴度=FIP高度提示；② 干性FIP无典型腹水，可表现为淋巴结增大/神经症状/眼部病变；③ 多猫家庭FCoV传播风险高；④ 传统治疗（泼尼松龙）仅姑息，中位生存期数周至数月；⑤ 需与淋巴瘤/感染性腹膜炎鉴别。"
  difficulty: advanced

- id: case_010
  title: "7岁绝育雄性比格犬 — 癫痫持续状态"
  species: 犬
  breed: 比格犬
  age: 7
  weight: 14
  chief_complaint: "全身强直-阵挛发作持续5分钟"
  history: "今早突然倒地，全身强直-阵挛发作，持续约5分钟未自行停止。这是首次发作。无中毒接触史，无外伤。"
  physical_exam: "发作后状态：T 40.5°C（发作后高热），HR 180bpm，定向力障碍，盲目走动。发作间期神经学检查：正常。"
  lab_results: "GLU 180 mg/dL（发作后应激性高血糖）。CBC/生化: 基本正常（排除低血糖/肝性脑病/电解质紊乱）。"
  imaging: "发作间期：建议MRI（排除结构性病变），主人暂不同意。"
  diagnosis: "特发性癫痫（首次发作，排除代谢性/结构性原因后）"
  treatment: "1. 地西泮 1 mg/kg IV 终止发作；2. 苯巴比妥 3 mg/kg PO q12h 维持（首次发作通常不立即开始长期抗癫痫，但发作>5分钟需干预）；3. 2周后复查苯巴比妥血药浓度（目标15-40 μg/mL）。"
  outcome: "发作终止。告知如6个月内再次发作则开始长期抗癫痫治疗。3个月后随访无再次发作。"
  learning_points: "① 癫痫持续状态（>5分钟）是急症，地西泮IV是首选；② 首次发作需排除代谢性原因（低血糖/肝性脑病/电解质）和中毒；③ 特发性癫痫诊断是排除性诊断；④ 犬特发性癫痫好发品种：比格、金毛、拉布拉多；⑤ 苯巴比妥血药浓度监测是长期管理关键。"
  difficulty: intermediate

- id: case_011
  title: "5岁绝育雌性家短毛猫 — 尿频与血尿"
  species: 猫
  breed: 家短毛猫
  age: 5
  weight: 4.2
  chief_complaint: "尿频、血尿、在猫砂盆外排尿"
  history: "近1周尿频，每次尿量少，可见血尿。在猫砂盆外排尿（沙发上）。无多饮多尿。室内饲养，近期有新猫引入（应激因素）。"
  physical_exam: "T 38.8°C，HR 180bpm，RR 24次/分。腹部触诊：膀胱小而空（频繁排尿），触诊无疼痛。体表无外伤。"
  lab_results: "尿液分析: 血尿（+++），pH 7.0，尿比重 1.040，蛋白（+），沉渣见大量RBC和少量WBC，未见细菌。CBC: 正常范围。生化: BUN 22 mg/dL，CREA 1.4 mg/dL（肾功能正常）。"
  imaging: "腹部X线：膀胱充盈，未见高密度影（排除结石）。腹部超声：膀胱壁轻度增厚，腔内少量回声（血液/结晶），双肾大小回声正常。"
  diagnosis: "猫特发性膀胱炎（FIC）- 应激相关"
  treatment: "1. 环境丰富化（增加猫砂盆数量、提供垂直空间、减少新猫冲突）；2. 加巴喷丁 10 mg/kg PO q12h 镇痛+抗焦虑；3. 保证充足饮水（湿粮+流动饮水器）；4. 费利威（Feliway）扩散器缓解应激。"
  outcome: "2周后尿频明显改善，血尿消失。继续环境管理，3个月后未复发。"
  learning_points: "① 年轻猫血尿最常见原因是特发性膀胱炎（FIC），而非细菌感染；② 猫UTI在年轻猫中罕见（<10岁猫UTI发病率<3%），多见于老年猫/糖尿病猫；③ 应激是FIC的核心诱因（新猫/环境变化）；④ 治疗核心是环境管理+镇痛，不推荐常规使用抗生素；⑤ 需与结石、肿瘤鉴别。"
  difficulty: basic

- id: case_012
  title: "10岁绝育雌性贵宾犬 - 双侧后肢无力与多饮多尿"
  species: 犬
  breed: 贵宾犬
  age: 10
  weight: 6.5
  chief_complaint: "后肢无力1个月，多饮多尿，腹部膨隆"
  history: "近1个月后肢无力加重，上下楼梯困难。多饮多尿明显。腹部逐渐膨隆。食欲增加但四肢肌肉萎缩。既往无重大疾病。"
  physical_exam: "T 38.5C，HR 90bpm，RR 24次/分。典型满月脸，腹部膨隆（肝肿大+腹水），四肢肌肉萎缩，皮肤变薄。后肢肌力减弱。"
  lab_results: "ALP 850 U/L（显著升高，参考23-212），ALT 200 U/L（升高），胆固醇 380 mg/dL（升高），GLU 180 mg/dL（轻度升高，类固醇性糖尿病前期）。CBC: 淋巴细胞减少（<1.0x10^3/uL），嗜酸性粒细胞减少（应激/皮质醇）。尿比重 1.015（偏低）。ACTH刺激试验: 基础皮质醇 6 ug/dL，刺激后 28 ug/dL（>20=库欣综合征）。"
  imaging: "腹部超声: 双侧肾上腺增大（右侧5mm，左侧6mm），肝脏增大，少量腹水。排除肾上腺肿瘤（双侧增大提示垂体依赖型）。"
  diagnosis: "库欣综合征（垂体依赖型）- 肾上腺皮质功能亢进"
  treatment: "1. 曲洛斯坦（Trilostane）3 mg/kg PO q24h（抑制皮质醇合成）；2. 2周后复查ACTH刺激试验调整剂量（目标刺激后皮质醇1-5 ug/dL）；3. 监测电解质和肾功能。"
  outcome: "用药4周后ACTH刺激试验：刺激后皮质醇4.2 ug/dL（达标）。多饮多尿明显改善，肌力逐渐恢复。需终身用药，每3个月复查。"
  learning_points: "① 库欣综合征三联征：多饮多尿+腹部膨隆+皮肤变薄/满月脸；② ALP显著升高（通常>500）是库欣最敏感的生化指标；③ ACTH刺激试验是首选确诊方法；④ 曲洛斯坦是首选药物（可逆性抑制）；⑤ 需鉴别医源性库欣（长期使用糖皮质激素）。"
  difficulty: intermediate

- id: case_013
  title: "6岁未绝育雄性德国牧羊犬 - 突发腹胀与干呕"
  species: 犬
  breed: 德国牧羊犬
  age: 6
  weight: 38
  chief_complaint: "突发腹部膨大，干呕但吐不出东西，烦躁不安"
  history: "晚饭后剧烈运动，1小时后腹部迅速膨大，尝试干呕但无呕吐物。烦躁不安，不愿躺下。大型深胸犬种，GDV高风险。"
  physical_exam: "T 38.0C，HR 180bpm（严重心动过速），RR 40次/分，黏膜苍白，CRT 3秒。腹部膨隆如鼓，叩诊鼓音。胃管插入受阻（贲门扭转）。休克体征明显。"
  lab_results: "血气: 严重代谢性酸中毒（pH 7.20，HCO3- 12 mEq/L）- 组织灌注不足/乳酸酸中毒。K+ 3.0 mEq/L（降低）。BUN 40 mg/dL（升高，肾前性）。"
  imaging: "腹部X线右侧位：胃显著扩张，幽门向右侧移位，胃内大量气体/液体，双气泡征（分隔征）。确诊GDV。"
  diagnosis: "胃扩张-扭转（GDV）"
  treatment: "1. 紧急！两条大口径静脉通路，乳酸林格液 90 ml/kg/h 抗休克；2. 胃穿刺减压（18G针头穿刺胃扩张部）；3. 紧急手术：胃复位+胃固定术（胃壁固定于腹壁防复发）；4. 术中评估胃壁活力（坏死胃壁切除）；5. 术后24-48h心电监护（室性心律失常高发）。"
  outcome: "手术成功，胃壁活力尚可。术后12h出现室性早搏（利多卡因 2 mg/kg IV控制）。第3天开始进食，第5天出院。建议终身少量多餐，避免餐后剧烈运动。"
  learning_points: "① GDV是真正的急症，时间=生命，延迟手术死亡率>50%；② 大型深胸犬种高发（德牧、大丹、圣伯纳）；③ X线双气泡征是GDV特征性表现；④ 术前必须抗休克+胃减压；⑤ 胃固定术是预防复发的关键；⑥ 术后心律失常（室性）是最常见致死并发症。"
  difficulty: advanced

- id: case_014
  title: "2岁未绝育雄性家短毛猫 - 发热、腹水与黄疸"
  species: 猫
  breed: 家短毛猫
  age: 2
  weight: 3.8
  chief_complaint: "发热2周，腹部膨隆，精神差"
  history: "近2周发热（体温波动39.5-40.5C），抗生素治疗无效。食欲下降，体重减轻。腹部逐渐膨隆。多猫家庭（5只猫），近期有新生小猫。"
  physical_exam: "T 40.2C，HR 200bpm，RR 32次/分。黄疸（黏膜黄染），腹部膨隆有波动感，触诊有疼痛。体况评分3/9。"
  lab_results: "总蛋白 9.2 g/dL（升高），球蛋白 7.0 g/dL（显著升高），白蛋白 2.2 g/dL（降低），A/G比 0.24（显著降低）。CBC: 淋巴细胞减少，轻度非再生性贫血。生化: ALT 120 U/L（轻度升高），TBIL 5.0 mg/dL（显著升高）。FCoV抗体滴度 1:3200（高滴度）。"
  imaging: "腹部超声：腹腔内大量黄色黏稠液体，肝脏表面可见白色渗出物附着，肠系膜淋巴结增大。肾脏大小正常。"
  diagnosis: "猫传染性腹膜炎（FIP，湿性/渗出型）"
  treatment: "1. GS-441528（瑞德西韦类似物）5 mg/kg SC q24h，疗程12周（FIP特效治疗）；2. 穿刺放腹水缓解呼吸压迫；3. 泼尼松龙 2 mg/kg PO q24h 抗炎（逐渐减量）；4. 营养支持（高蛋白饮食）。"
  outcome: "治疗2周后体温恢复正常，腹水逐渐吸收。12周疗程结束后病毒学指标转阴。持续随访6个月无复发。"
  learning_points: "① 湿性FIP诊断要点：发热+腹水+高球蛋白+低A/G比+高FCoV滴度；② 腹腔液分析（渗出液+高球蛋白）是关键；③ GS-441528/Remdesivir是FIP突破性治疗（>80%治愈率）；④ FIP好发于年轻猫（<2岁），多猫环境高发；⑤ 干湿混合型FIP可共存。"
  difficulty: advanced

- id: case_015
  title: "4岁绝育雌性拉布拉多犬 - 跛行与关节肿胀"
  species: 犬
  breed: 拉布拉多犬
  age: 4
  weight: 32
  chief_complaint: "右前肢跛行2周，近期左后肢也出现跛行"
  history: "2周前开始右前肢跛行，休息后无明显改善。近3天左后肢也开始跛行。无外伤史。多关节对称性发病。食欲正常，偶有低热。"
  physical_exam: "T 39.2C，HR 100bpm，RR 20次/分。右腕关节和左膝关节肿胀、温热、触诊疼痛。跛行评分3/5。肌肉量正常。"
  lab_results: "CBC: WBC 16x10^3/uL（轻度升高），中性粒80%。CRP升高（炎症标志物）。RF（类风湿因子）阴性。ANA（抗核抗体）阴性。关节液分析: 黄色透明，黏稠度降低，WBC 25x10^3/uL（炎症性），以中性粒为主，无细菌。"
  imaging: "X线：右腕关节和左膝关节软组织肿胀，关节间隙轻度增宽，未见明显骨侵蚀（早期）。"
  diagnosis: "免疫介导性多关节炎（IMPA）- 特发性"
  treatment: "1. 泼尼松龙 2 mg/kg PO q24h 诱导缓解，4周后逐渐减量；2. 硫唑嘌呤 2 mg/kg PO q24h（激素节约剂）；3. 限制运动；4. 每2周复查CBC监测药物副作用。"
  outcome: "2周后跛行明显改善，关节肿胀消退。6周后激素开始缓慢减量。需长期低剂量免疫抑制维持。"
  learning_points: "① 多关节对称性跛行+无外伤史=免疫介导性关节炎可能性大；② 关节液分析排除感染性关节炎（无细菌+炎症性）；③ 特发性IMPA是排除性诊断（需排除RF/ANA阳性）；④ 治疗需要长期免疫抑制，不可过早停药；⑤ 需与莱姆病、类风湿关节炎鉴别。"
  difficulty: intermediate

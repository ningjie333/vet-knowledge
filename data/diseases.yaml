# 兽医知识库 — 疾病数据
# 添加新疾病：复制一个完整块，修改 id 和字段值即可
# urgency_level: 1=择期 2=常规门诊 3=标准急诊 4=高急迫 5=危及生命

- id: dis_001
  name_zh: 肺炎
  name_en: Pneumonia
  category: ["呼吸系统"]
  species: ["犬", "猫"]
  difficulty: intermediate
  urgency_level: 3
  overview: 肺部炎症反应，可由细菌、病毒、真菌或吸入性因素引起。犬最常见为细菌性肺炎，猫多为吸入性或病毒性。
  etiology: ["细菌感染(博德特氏菌、链球菌)", "病毒感染", "真菌感染", "吸入性因素"]
  pathophysiology: 病原体入侵肺泡后炎症介质释放，中性粒细胞浸润，肺泡充满渗出液导致气体交换障碍和低氧血症。
  prognosis: 早期治疗预后良好。

- id: dis_002
  name_zh: 心力衰竭(犬)
  name_en: CHF
  category: ["心血管系统"]
  species: ["犬"]
  difficulty: advanced
  urgency_level: 4
  overview: 心脏泵血功能不足以满足机体代谢需求，导致肺循环和/或体循环淤血。最常见病因是黏液样二尖瓣退化(MMVD)。
  etiology: ["MMVD", "DCM", "先天性心脏病"]
  pathophysiology: 瓣膜关闭不全导致血液反流，心房压力升高导致肺静脉压升高引发肺水肿。
  prognosis: 取决于病因和控制程度。

- id: dis_003
  name_zh: 猫哮喘
  name_en: Feline Asthma
  category: ["呼吸系统"]
  species: ["猫"]
  difficulty: intermediate
  urgency_level: 2
  overview: 猫下呼吸道慢性炎症性疾病，特征为气道高反应性和可逆性气流受限。
  etiology: ["过敏原(尘螨、花粉、烟雾)", "环境刺激物", "应激", "特发性"]
  pathophysiology: IgE介导的I型超敏反应，肥大细胞脱颗粒，嗜酸性粒细胞浸润导致气道平滑肌收缩和黏膜水肿。
  prognosis: 需终身管理，多数猫经治疗可正常生活。

- id: dis_004
  name_zh: 气管塌陷
  name_en: Tracheal Collapse
  category: ["呼吸系统"]
  species: ["犬"]
  difficulty: intermediate
  urgency_level: 2
  overview: 气管软骨环变平、气管膜松弛导致气管腔狭窄，多见于小型犬。特征性表现为阵发性鹅叫样咳嗽。
  etiology: ["遗传倾向(贵宾、约克夏)", "肥胖", "老年退行性变"]
  pathophysiology: 软骨结构异常导致吸气时气管塌陷气流受阻而咳嗽。
  prognosis: 控制症状为主，无法根治。

- id: dis_005
  name_zh: 急性肾损伤
  name_en: AKI
  category: ["泌尿系统", "急诊"]
  species: ["犬", "猫"]
  difficulty: advanced
  urgency_level: 4
  overview: 肾功能急剧下降，表现为氮质血症、少尿/无尿和电解质紊乱。
  etiology: ["缺血(脱水、休克)", "肾毒性药物(NSAIDs、乙二醇)", "钩端螺旋体病", "尿路梗阻"]
  pathophysiology: 肾血流下降或肾毒性因素导致肾小管上皮细胞坏死，GFR下降导致代谢废物蓄积。
  prognosis: 早期干预可逆，延误则可能进展为CKD或死亡。

- id: dis_006
  name_zh: 慢性肾病
  name_en: CKD
  category: ["泌尿系统"]
  species: ["犬", "猫"]
  difficulty: advanced
  urgency_level: 2
  overview: 肾功能进行性和不可逆性丧失，是老年猫最常见的疾病之一。
  etiology: ["特发性肾小管间质性肾炎", "肾淀粉样变(猫)", "多囊肾(猫)", "既往AKI后遗症"]
  pathophysiology: 肾单位逐渐丢失，残余肾单位高滤过导致进一步损伤和纤维化。
  prognosis: 不可逆，但早期干预可显著延长生存期。

- id: dis_007
  name_zh: 尿路感染
  name_en: UTI
  category: ["泌尿系统"]
  species: ["犬", "猫"]
  difficulty: basic
  urgency_level: 1
  overview: 细菌侵入泌尿道并定植繁殖引起的炎症。犬较猫常见。
  etiology: ["大肠杆菌(最常见)", "葡萄球菌", "逆行性上行感染"]
  pathophysiology: 细菌经尿道口上行在膀胱黏膜定植引发炎症反应。
  prognosis: 单纯性UTI抗生素治疗预后极好。

- id: dis_008
  name_zh: 猫下尿路疾病
  name_en: FLUTD
  category: ["泌尿系统"]
  species: ["猫"]
  difficulty: intermediate
  urgency_level: 4
  overview: 猫下泌尿道疾病的总称，包括特发性膀胱炎(最常见)、尿结石、尿道梗阻等。
  etiology: ["特发性膀胱炎(FIC)", "鸟粪石/草酸钙结石", "尿道痉挛", "应激"]
  pathophysiology: 应激导致交感神经激活，膀胱黏膜通透性增加，钾离子渗入组织层刺激C纤维导致疼痛。
  prognosis: FIC易复发，尿道梗阻为急症。

- id: dis_009
  name_zh: 胰腺炎
  name_en: Pancreatitis
  category: ["消化系统"]
  species: ["犬", "猫"]
  difficulty: advanced
  urgency_level: 3
  overview: 胰腺的炎症性疾病。犬多与高脂饮食有关，猫多为特发性或继发于IBD。
  etiology: ["高脂饮食/高甘油三酯血症", "药物(化疗药)", "创伤", "特发性(猫)"]
  pathophysiology: 胰酶在胰腺内提前激活导致自身消化，炎症介质释放引发全身炎症反应。
  prognosis: 轻度预后良好，重症坏死性胰腺炎死亡率30-50%。

- id: dis_010
  name_zh: 胃肠炎
  name_en: Gastroenteritis
  category: ["消化系统"]
  species: ["犬", "猫"]
  difficulty: basic
  urgency_level: 2
  overview: 胃和/或肠道的炎症，是最常见的消化系统主诉之一。
  etiology: ["饮食不当/食物变质", "细菌(沙门氏菌)", "病毒(细小、冠状病毒)", "寄生虫"]
  pathophysiology: 病原体或刺激物损伤胃肠黏膜导致炎症反应，黏膜屏障破坏导致水电解质分泌异常。
  prognosis: 单纯性预后极好，病毒性细小未免疫幼犬死亡率可达91%。

- id: dis_011
  name_zh: 异物梗阻
  name_en: Foreign Body
  category: ["消化系统", "外科"]
  species: ["犬", "猫"]
  difficulty: intermediate
  urgency_level: 3
  overview: 异物滞留消化道导致机械性梗阻。犬更常见。
  etiology: ["玩具、骨头、袜子", "毛球(猫)", "线性异物(绳线，猫特有)"]
  pathophysiology: 异物嵌顿导致局部压迫，静脉回流受阻后动脉供血障碍导致肠壁缺血坏死。
  prognosis: 早期取出预后好，穿孔后并发症风险高。

- id: dis_012
  name_zh: 肝衰竭
  name_en: Liver Failure
  category: ["消化系统"]
  species: ["犬", "猫"]
  difficulty: advanced
  urgency_level: 3
  overview: 肝脏功能严重受损，可分为急性肝衰竭和慢性肝病终末期。
  etiology: ["药物/毒素(对乙酰氨基酚-猫、木糖醇-犬)", "感染(钩端螺旋体、FIP)", "肿瘤"]
  pathophysiology: 大量肝细胞坏死导致解毒功能下降(高氨血症)、合成功能下降(低白蛋白)、胆汁排泄障碍(黄疸)。
  prognosis: 急性早期治疗可恢复，终末期预后差。

- id: dis_013
  name_zh: 炎症性肠病
  name_en: IBD
  category: ["消化系统"]
  species: ["犬", "猫"]
  difficulty: advanced
  urgency_level: 2
  overview: 特发性慢性胃肠道炎症性疾病，特征为持续性GI症状和组织学炎症。
  etiology: ["食物过敏/不耐受", "肠道菌群失调", "免疫调节异常"]
  pathophysiology: 肠黏膜免疫失调导致慢性炎症浸润，黏膜屏障损伤导致吸收不良。
  prognosis: 需长期管理，部分可药物控制。

- id: dis_014
  name_zh: 扩张型心肌病
  name_en: DCM
  category: ["心血管系统"]
  species: ["犬"]
  difficulty: advanced
  urgency_level: 3
  overview: 心室腔扩大伴收缩功能降低，是大型犬最常见的获得性心脏病。杜宾、大丹高发。
  etiology: ["遗传(杜宾、大丹)", "营养缺乏(牛磺酸)", "特发性"]
  pathophysiology: 心肌收缩力下降导致心输出量降低，代偿性心室扩张进一步加重瓣膜反流。
  prognosis: 预后差，确诊后中位生存期3-6个月。

- id: dis_015
  name_zh: 猫肥厚型心肌病
  name_en: HCM
  category: ["心血管系统"]
  species: ["猫"]
  difficulty: advanced
  urgency_level: 2
  overview: 左心室壁和/或室间隔向心性肥厚，是猫最常见的心脏病。缅因猫、布偶猫有遗传倾向。
  etiology: ["遗传(肌节蛋白基因突变)", "继发于甲亢", "继发于高血压"]
  pathophysiology: 心肌肥厚导致舒张功能障碍，左房压升高引发肺静脉充血和肺水肿。
  prognosis: 取决于严重程度，合并动脉血栓预后差。

- id: dis_016
  name_zh: 心包积液
  name_en: Pericardial Effusion
  category: ["心血管系统"]
  species: ["犬", "猫"]
  difficulty: advanced
  urgency_level: 5
  overview: 心包腔内液体异常积聚，可导致心脏压塞。犬最常见病因是血管肉瘤。
  etiology: ["血管肉瘤(金毛、德牧)", "心包囊腺癌", "感染性心包炎", "特发性"]
  pathophysiology: 心包内液体积聚导致心包压升高，心室舒张受限，心输出量急剧下降。
  prognosis: 恶性病因预后极差。

- id: dis_017
  name_zh: 糖尿病
  name_en: Diabetes Mellitus
  category: ["内分泌系统"]
  species: ["犬", "猫"]
  difficulty: intermediate
  urgency_level: 2
  overview: 胰岛素分泌不足或胰岛素抵抗导致的高血糖综合征。犬多为I型，猫多为II型。
  etiology: ["自身免疫性beta细胞破坏(犬)", "胰岛素抵抗/肥胖(猫)", "胰腺炎后继发", "药物(糖皮质激素)"]
  pathophysiology: 胰岛素不足导致葡萄糖利用障碍而高血糖，脂肪分解增加导致酮体生成和酮症酸中毒。
  prognosis: 需终身胰岛素治疗(犬)，猫部分可缓解。

- id: dis_018
  name_zh: 库欣综合征
  name_en: Hyperadrenocorticism
  category: ["内分泌系统"]
  species: ["犬", "猫"]
  difficulty: advanced
  urgency_level: 2
  overview: 肾上腺皮质分泌过多皮质醇导致的临床综合征。犬多为垂体依赖性(85%)。
  etiology: ["垂体ACTH瘤(85%犬)", "肾上腺肿瘤(15%)", "医源性(长期使用糖皮质激素)"]
  pathophysiology: 皮质醇过量导致蛋白质分解增加(皮肤变薄、肌肉萎缩)、肝糖异生增加(高血糖)、免疫抑制。
  prognosis: 垂体依赖性经药物控制中位生存期2-3年。

- id: dis_019
  name_zh: 猫甲状腺功能亢进
  name_en: Feline Hyperthyroidism
  category: ["内分泌系统"]
  species: ["猫"]
  difficulty: intermediate
  urgency_level: 2
  overview: 甲状腺激素过度分泌，是老年猫最常见的内分泌疾病。多为甲状腺腺瘤样增生。
  etiology: ["甲状腺腺瘤样增生(95%)", "甲状腺腺癌(<5%)"]
  pathophysiology: T3和T4升高导致基础代谢率增加，蛋白质分解增加(体重下降但食欲增加)，心率增加可引发HCM。
  prognosis: 药物或放射性碘治疗效果良好。

- id: dis_020
  name_zh: 甲状腺功能减退
  name_en: Hypothyroidism
  category: ["内分泌系统"]
  species: ["犬"]
  difficulty: basic
  urgency_level: 1
  overview: 甲状腺激素分泌不足，是犬最常见的内分泌疾病。多为自身免疫性甲状腺炎。
  etiology: ["自身免疫性淋巴性甲状腺炎", "特发性甲状腺萎缩", "先天性(罕见)"]
  pathophysiology: T3和T4下降导致基础代谢率降低，体重增加、怕冷、嗜睡。
  prognosis: 需终身甲状腺素替代治疗，预后极好。

- id: dis_021
  name_zh: 乙二醇中毒
  name_en: Ethylene Glycol
  category: ["中毒与急救"]
  species: ["犬", "猫"]
  difficulty: advanced
  urgency_level: 5
  overview: 防冻剂中毒，代谢为草酸钙结晶沉积于肾小管导致AKI。猫致死剂量仅1.5ml/kg。
  etiology: ["摄入防冻剂(汽车冷却液)", "园林产品", "某些油漆溶剂"]
  pathophysiology: 乙二醇代谢为草酸，与钙结合形成草酸钙结晶沉积于肾小管导致机械性损伤和缺血。
  prognosis: 犬12-24h内治疗可能存活，猫预后极差。

- id: dis_022
  name_zh: 巧克力中毒
  name_en: Chocolate Toxicity
  category: ["中毒与急救"]
  species: ["犬"]
  difficulty: basic
  urgency_level: 1
  overview: 可可碱和咖啡因中毒，刺激中枢神经系统和心血管系统。黑巧毒性最高。
  etiology: ["摄入巧克力", "可可制品"]
  pathophysiology: 可可碱抑制腺苷受体导致中枢兴奋，磷酸二酯酶抑制导致cAMP升高引发心律失常。
  prognosis: 轻度预后好，严重心律失常可致死。

- id: dis_023
  name_zh: 百合中毒
  name_en: Lily Toxicity
  category: ["中毒与急救"]
  species: ["猫"]
  difficulty: advanced
  urgency_level: 5
  overview: 百合属植物对猫有剧毒，任何部位(包括花粉和水)均可导致AKI。
  etiology: ["摄入百合属植物", "接触花粉", "饮用百合花瓶水"]
  pathophysiology: 肾小管上皮细胞坏死导致AKI，机制尚未完全明确。
  prognosis: 摄入后8h内积极治疗可挽救，延误则致死率极高。

- id: dis_024
  name_zh: 布洛芬中毒
  name_en: Ibuprofen Toxicity
  category: ["中毒与急救"]
  species: ["犬", "猫"]
  difficulty: basic
  urgency_level: 4
  overview: NSAIDs中毒，猫极为敏感。
  etiology: ["主人自行喂药", "误食药物", "过量使用"]
  pathophysiology: COX-1抑制导致胃黏膜PG合成减少引发胃溃疡，肾血管收缩导致肾血流减少引发AKI。
  prognosis: 剂量依赖，猫>50mg/kg可致死。

- id: dis_025
  name_zh: 犬细小病毒病
  name_en: Parvovirus
  category: ["传染病"]
  species: ["犬"]
  difficulty: intermediate
  urgency_level: 3
  overview: 高度传染性病毒性肠炎，主要影响未免疫幼犬。特征为严重出血性肠炎和白细胞减少。
  etiology: ["CPV-2(2a/2b/2c型)", "未免疫/免疫失败"]
  pathophysiology: 病毒感染肠隐窝上皮导致细胞坏死和肠绒毛萎缩，骨髓抑制导致白细胞急剧下降。
  prognosis: 未治疗死亡率91%，积极治疗存活率80-90%。

- id: dis_026
  name_zh: 犬瘟热
  name_en: Canine Distemper
  category: ["传染病"]
  species: ["犬"]
  difficulty: advanced
  urgency_level: 3
  overview: 犬瘟热病毒引起的多系统感染，可影响呼吸、消化和神经系统。
  etiology: ["CDV", "未免疫", "接触感染犬分泌物"]
  pathophysiology: 病毒先在淋巴系统复制后形成病毒血症，多系统感染，神经损伤可为不可逆。
  prognosis: 神经症状出现后预后差，存活犬可能有永久性后遗症。

- id: dis_027
  name_zh: 猫泛白细胞减少症
  name_en: Feline Panleukopenia
  category: ["传染病"]
  species: ["猫"]
  difficulty: intermediate
  urgency_level: 4
  overview: 猫细小病毒引起的高度传染性病毒病，特征为泛白细胞减少和出血性肠炎。
  etiology: ["FPV", "未免疫"]
  pathophysiology: 病毒感染分裂活跃的细胞(肠隐窝、骨髓)导致肠炎和泛白细胞减少。
  prognosis: 未治疗死亡率>90%，积极治疗存活率约50%。

- id: dis_028
  name_zh: 猫传染性腹膜炎
  name_en: FIP
  category: ["传染病"]
  species: ["猫"]
  difficulty: advanced
  urgency_level: 3
  overview: 猫冠状病毒突变引起的免疫介导性血管炎，分为湿性和干性。预后极差。
  etiology: ["FCoV突变", "多猫环境", "应激", "遗传易感性"]
  pathophysiology: 突变病毒在巨噬细胞中复制，免疫复合物沉积于血管壁导致血管炎。
  prognosis: 传统观点认为不治之症。

- id: dis_029
  name_zh: 胃扩张-扭转
  name_en: GDV
  category: ["外科", "急诊"]
  species: ["犬"]
  difficulty: advanced
  urgency_level: 5
  overview: 胃内气体/液体积聚并发生轴向扭转，是大型深胸犬的致命急症。
  etiology: ["大型/巨型犬(大丹、德牧)", "老年", "饭后剧烈运动"]
  pathophysiology: 胃扭转导致贲门和幽门闭塞，胃内压升高导致静脉回流受阻和胃壁缺血坏死。
  prognosis: 术前死亡率15-30%，胃壁坏死需切除则死亡率>50%。

- id: dis_030
  name_zh: 子宫蓄脓
  name_en: Pyometra
  category: ["外科", "生殖系统"]
  species: ["犬", "猫"]
  difficulty: intermediate
  urgency_level: 3
  overview: 子宫内脓液积聚，是未绝育母犬的常见急症。多在发情后4-8周发生。
  etiology: ["黄体期孕激素作用", "继发细菌感染(大肠杆菌)", "未绝育中老年母犬"]
  pathophysiology: 孕激素导致子宫内膜增生、子宫颈关闭，细菌在封闭子宫内繁殖导致脓液蓄积和内毒素吸收。
  prognosis: 手术切除预后极好，延误可致子宫破裂和败血症死亡。

- id: dis_031
  name_zh: 癫痫
  name_en: Epilepsy
  category: ["神经系统"]
  species: ["犬", "猫"]
  difficulty: intermediate
  urgency_level: 3
  overview: 大脑神经元异常过度放电导致的反复发作性神经功能障碍。犬多为特发性癫痫，猫多为继发性。
  etiology: ["特发性/遗传性(犬)", "结构性病变(肿瘤、脑炎)", "代谢性(低血糖、肝性脑病)", "中毒"]
  pathophysiology: 大脑皮层神经元同步异常放电，GABA能抑制功能下降或谷氨酸能兴奋性增强导致发作阈值降低。
  prognosis: 特发性癫痫经药物控制预后良好，但需终身用药。结构性病因预后取决于原发病。

- id: dis_032
  name_zh: 免疫介导性多关节炎
  name_en: IMPA
  category: ["免疫系统"]
  species: ["犬"]
  difficulty: intermediate
  urgency_level: 2
  overview: 免疫系统攻击自身关节滑膜导致的对称性多关节炎症。是犬最常见的免疫介导性疾病之一。
  etiology: ["特发性(最常见)", "药物反应", "肿瘤相关", "感染后免疫复合物沉积"]
  pathophysiology: 免疫复合物沉积于滑膜血管壁激活补体，中性粒细胞浸润释放蛋白酶和炎症介质导致滑膜增生和关节软骨破坏。
  prognosis: 早期积极免疫抑制治疗预后良好，但需长期维持。感染性关节炎必须排除。

- id: dis_033
  name_zh: 免疫介导性溶血性贫血
  name_en: IMHA
  category: ["免疫系统", "血液系统"]
  species: ["犬", "猫"]
  difficulty: advanced
  urgency_level: 4
  overview: 免疫系统攻击自身红细胞导致的急性溶血性贫血。犬发病率高，猫多为继发性。致死率高，是内科急症。
  etiology: ["特发性(犬最常见)", "继发于肿瘤/感染/药物", "猫继发于FeLV/支原体"]
  pathophysiology: IgG或IgM抗体结合红细胞表面抗原，激活补体导致血管内溶血，或巨噬细胞吞噬导致血管外溶血。
  prognosis: 犬死亡率30-50%，合并DIC预后极差。猫继发性IMHA预后取决于原发病。

- id: dis_034
  name_zh: 淋巴瘤
  name_en: Lymphoma
  category: ["肿瘤科"]
  species: ["犬", "猫"]
  difficulty: advanced
  urgency_level: 3
  overview: 淋巴细胞的恶性肿瘤，是犬猫最常见的肿瘤类型。犬多为多中心型，猫多为消化道型。
  etiology: ["遗传易感性(犬)", "FeLV/FIV(猫)", "环境因素(除草剂暴露-犬)", "慢性炎症"]
  pathophysiology: 淋巴细胞克隆性增殖，侵犯淋巴结、肝脾、骨髓等器官。肿瘤细胞抑制正常造血和免疫功能。
  prognosis: 犬不治疗中位生存期4-6周，化疗后12-14个月。猫低度恶性可达2年。

- id: dis_035
  name_zh: 前十字韧带撕裂
  name_en: CCL Tear
  category: ["外科", "骨科"]
  species: ["犬"]
  difficulty: intermediate
  urgency_level: 2
  overview: 前十字韧带(ACL)部分或完全断裂，是犬最常见的骨科手术指征。多见于大型犬和肥胖犬。
  etiology: ["退行性韧带变性(最常见)", "肥胖", "品种易感性(拉布拉多、金毛)", "外伤性(少见)"]
  pathophysiology: 韧带变性导致机械强度下降，轻微外力即可断裂。关节不稳定导致继发性骨关节炎和半月板损伤。
  prognosis: 手术修复后预后良好，80-90%恢复良好功能。未手术将进行性骨关节炎。

- id: dis_036
  name_zh: 心丝虫病
  name_en: Heartworm Disease
  category: ["寄生虫", "心血管系统"]
  species: ["犬", "猫"]
  difficulty: intermediate
  urgency_level: 3
  overview: 犬恶丝虫(Dirofilaria immitis)寄生于肺动脉和右心，通过蚊虫传播。可导致肺动脉高压和右心衰。
  etiology: ["蚊虫叮咬传播", "未预防用药", "温暖潮湿地区高发"]
  pathophysiology: 成虫寄生于肺动脉，机械损伤血管内皮引发肺动脉高压。死亡虫体栓塞肺血管可致急性呼吸衰竭。
  prognosis: 犬治疗后预后取决于病变严重程度。猫无特效治疗，以支持治疗为主。预防远优于治疗。

- id: dis_037
  name_zh: 脓皮症
  name_en: Pyoderma
  category: ["皮肤科"]
  species: ["犬"]
  difficulty: basic
  urgency_level: 1
  overview: 细菌性皮肤感染，是犬最常见的皮肤病。多为浅表性，常继发于过敏、寄生虫或内分泌疾病。
  etiology: ["葡萄球菌(最常见)", "继发于特应性皮炎/食物过敏", "内分泌疾病(甲减/库欣)", "皮肤褶皱"]
  pathophysiology: 皮肤屏障破坏后细菌定植繁殖，释放毒素和酶导致炎症反应。深层感染可形成脓肿和蜂窝织炎。
  prognosis: 浅表性抗生素治疗预后极好。深层感染需4-6周抗生素。必须治疗原发病以防复发。

- id: dis_038
  name_zh: 白内障
  name_en: Cataract
  category: ["眼科"]
  species: ["犬", "猫"]
  difficulty: intermediate
  urgency_level: 2
  overview: 晶状体混浊导致视力下降，是犬最常见的眼科疾病之一。糖尿病性白内障是犬最常见的类型，发展迅速。
  etiology: ["遗传(常见于贵宾、可卡犬)", "糖尿病(犬最常见继发原因)", "老年退行性变", "外伤", "先天性"]
  pathophysiology: 晶状体纤维变性导致光散射增加，晶状体透明度下降。糖尿病性白内障因高血糖导致山梨醇蓄积，渗透性水肿破坏晶状体纤维。
  prognosis: 手术(超声乳化摘除)后预后良好，视力恢复率90%以上。需控制原发病(如糖尿病)。

- id: dis_039
  name_zh: 青光眼
  name_en: Glaucoma
  category: ["眼科"]
  species: ["犬", "猫"]
  difficulty: advanced
  urgency_level: 4
  overview: 眼内压升高导致视网膜和视神经不可逆损伤，是致盲性眼病。急性闭角型青光眼为眼科急症。
  etiology: ["原发性(遗传，可卡犬、巴塞特猎犬高发)", "继发性(晶状体脱位、葡萄膜炎、眼内肿瘤)", "先天性"]
  pathophysiology: 房水排出受阻导致眼内压升高，视网膜神经节细胞缺血性损伤。犬急性眼压>40mmHg可在48-72小时内永久失明。
  prognosis: 早期治疗可延缓进展，已失明者不可逆。需终身管理，对侧眼有发病风险。

- id: dis_040
  name_zh: 角膜溃疡
  name_en: Corneal Ulcer
  category: ["眼科"]
  species: ["犬", "猫"]
  difficulty: intermediate
  urgency_level: 3
  overview: 角膜上皮缺损，可由外伤、感染、干眼症或眼睑异常引起。深部溃疡和穿孔为眼科急症。
  etiology: ["外伤(猫抓伤最常见)", "感染(细菌、真菌)", "干眼症(KCS)", "眼睑内翻/倒睫", "暴露性(面神经麻痹)"]
  pathophysiology: 角膜上皮屏障破坏后基质暴露，胶原酶活化导致基质溶解。深后弹力层膨出可致角膜穿孔。
  prognosis: 浅表溃疡经治疗1-2周内愈合。深部溃疡需手术(角膜移植/结膜瓣)，穿孔预后差。

- id: dis_041
  name_zh: 椎间盘疾病
  name_en: IVDD
  category: ["骨科", "神经系统"]
  species: ["犬"]
  difficulty: advanced
  urgency_level: 3
  overview: 椎间盘退变后突出或脱出压迫脊髓，是犬最常见的脊髓疾病。腊肠犬、比格犬等软骨营养不良品种高发。
  etiology: ["遗传性软骨营养不良(腊肠犬、比格犬)", "年龄相关退行性变", "外伤"]
  pathophysiology: 椎间盘髓核钙化后突然突出压迫脊髓，导致脊髓水肿、缺血和神经功能缺损。根据压迫程度分为I-V级。
  prognosis: I-II级保守治疗预后好；III-V级需手术减压。深痛觉消失超过48h预后极差。

- id: dis_042
  name_zh: 髋关节发育不良
  name_en: Hip Dysplasia
  category: ["骨科"]
  species: ["犬"]
  difficulty: intermediate
  urgency_level: 2
  overview: 髋关节窝和股骨头匹配不良导致关节不稳定和退行性关节病，是大型犬最常见的骨科疾病。
  etiology: ["遗传(金毛、拉布拉多、德牧高发)", "快速生长", "营养过剩(高热量饮食)", "运动不当"]
  pathophysiology: 髋关节松弛导致半脱位，关节软骨磨损，继发骨关节炎。进行性关节破坏导致疼痛和功能障碍。
  prognosis: 早期干预(幼年骨盆切开术)预后好。成年犬以药物管理和体重控制为主，严重者需股骨头切除或全髋置换。

- id: dis_043
  name_zh: 肥大细胞瘤
  name_en: Mast Cell Tumor
  category: ["肿瘤科"]
  species: ["犬", "猫"]
  difficulty: advanced
  urgency_level: 3
  overview: 肥大细胞来源的肿瘤，是犬最常见的皮肤肿瘤(占20%)，也是猫最常见的皮肤和内脏肿瘤之一。
  etiology: ["遗传易斗牛犬、拳师犬高发)", "慢性炎症刺激", "c-kit基因突变"]
  pathophysiology: 肥大细胞脱颗粒释放组胺、肝素等介质，可导致局部红肿、胃溃疡和过敏反应。高分级肿瘤可转移至淋巴结和内脏。
  prognosis: 犬低分级(I-II)手术切除后中位生存期>2年；高分级(III)预后差。猫皮肤型预后好，内脏型预后差。

- id: dis_044
  name_zh: 血管肉瘤
  name_en: Hemangiosarcoma
  category: ["肿瘤科"]
  species: ["犬"]
  difficulty: advanced
  urgency_level: 5
  overview: 血管内皮细胞的恶性肿瘤，高度侵袭性和转移性。最常见部位为脾脏、右心和皮下。金毛、德牧高发。
  etiology: ["遗传易感性(金毛寻回犬)", "紫外线暴露(浅肤色犬皮下型)", "慢性异物刺激"]
  pathophysiology: 肿瘤生长迅速，易自发性破裂导致致命性出血。早期血行转移至肺、肝和脑。
  prognosis: 极差。单纯手术中位生存期1-3月，联合化疗可延长至6-8月。

- id: dis_045
  name_zh: 异位性皮炎
  name_en: Canine Atopic Dermatitis
  category: ["皮肤科"]
  species: ["犬"]
  difficulty: intermediate
  urgency_level: 2
  overview: 遗传性过敏反应性炎症性皮肤病，是犬最常见的皮肤病。特征为慢性瘙痒，多始于1-3岁。
  etiology: ["遗传性IgE介导的超敏反应", "环境过敏原(尘螨、花粉、霉菌)", "皮肤屏障缺陷"]
  pathophysiology: 过敏原经皮肤进入，被朗格汉斯细胞呈递，Th2型免疫反应导致IgE产生和肥大细胞脱颗粒，释放炎症介质引起瘙痒。
  prognosis: 需终身管理，无法根治。奥克拉珠单抗靶向治疗效果好。继发感染需积极控制。

- id: dis_046
  name_zh: 钩端螺旋体病
  name_en: Leptospirosis
  category: ["传染病"]
  species: ["犬", "猫"]
  difficulty: intermediate
  urgency_level: 4
  overview: 人畜共患的螺旋体感染，可导致急性肝肾衰竭。主要通过接触受感染动物尿液污染的水源传播。
  etiology: ["钩端螺旋体(血清型: icterohaemorrhagiae, canicola, pomona)", "接触污染水源", "野生动物传播"]
  pathophysiology: 螺旋体经黏膜侵入后血行播散至肝肾，导致肾小管间质性肾炎和肝细胞损伤。
  prognosis: 早期抗生素+支持治疗预后良好。严重肝肾衰竭或肺出血型预后差。可传播给人。

- id: dis_047
  name_zh: 脂肪肝(猫)
  name_en: Hepatic Lipidosis
  category: ["消化系统"]
  species: ["猫"]
  difficulty: intermediate
  urgency_level: 4
  overview: 肝细胞内大量甘油三酯蓄积导致肝功能衰竭，是猫最常见的肝病。多由厌食/禁食诱发，肥胖猫高发。
  etiology: ["厌食/禁食(最常继发于其他疾病)", "肥胖", "糖尿病", "胰腺炎", "甲亢"]
  pathophysiology: 机体能量需求增加时脂肪大量动员至肝脏，超过肝脏氧化和转运能力导致肝细胞脂肪变性。严重时胆汁排泄障碍导致黄疸。
  prognosis: 积极营养支持(鼻饲/食道饲管)后预后良好，存活率可达80%。延误治疗可致死。

- id: dis_048
  name_zh: 免疫介导性血小板减少症
  name_en: ITP
  category: ["免疫系统", "血液系统"]
  species: ["犬"]
  difficulty: advanced
  urgency_level: 4
  overview: 免疫系统攻击自身血小板导致血小板减少，是犬最常见的获得性出血性疾病。母犬发病率高于公犬。
  etiology: ["特发性(最常见)", "继发于感染(埃立克体、利什曼)", "药物诱导", "肿瘤相关", "疫苗诱发"]
  pathophysiology: IgG抗体结合血小板表面糖蛋白，被脾脏巨噬细胞吞噬破坏。血小板<30,000/μL时有自发性出血风险。
  prognosis: 单纯ITP经免疫抑制治疗后70-80%可缓解。合并严重出血或DIC预后差。复发率20-30%。

- id: dis_049
  name_zh: 犬副流感
  name_en: Canine Parainfluenza
  category: ["传染病"]
  species: ["犬"]
  difficulty: basic
  urgency_level: 2
  overview: 犬副流感病毒(CPIV)引起的高度传染性呼吸道疾病，是犬窝咳综合征的常见病原之一。
  etiology: ["犬副流感病毒(CPIV)", "多病原混合感染(博德特氏菌)", "群养环境传播"]
  pathophysiology: 病毒损伤呼吸道纤毛上皮，破坏黏膜屏障，继发细菌感染加重症状。
  prognosis: 单纯感染5-10天自愈。继发细菌感染需抗生素治疗。预防以疫苗接种为主。

- id: dis_050
  name_zh: 子宫蓄脓(猫)
  name_en: Pyometra (Cat)
  category: ["外科", "生殖系统"]
  species: ["猫"]
  difficulty: intermediate
  urgency_level: 3
  overview: 猫的子宫蓄脓，与犬类似但发病率较低。未绝育中老年母猫在发情后易发。
  etiology: ["黄体期孕激素作用", "继发细菌感染", "未绝育母猫"]
  pathophysiology: 与犬相同，孕激素导致子宫内膜增生和子宫颈关闭，细菌在封闭子宫内繁殖。
  prognosis: 卵巢子宫切除术预后极好。延误可致子宫破裂和败血症。建议早期绝育预防。

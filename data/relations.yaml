  - disease: dis_077
    target: dis_010
    feature: 结肠炎有里急后重和血便，胃肠炎呕吐为主，IBD慢性持续且对饮食调整无效

  - disease: dis_078
    target: dis_024
    feature: 静脉血栓有患肢肿胀和疼痛，心衰有对称性腹水和肝肿大，无单侧肢体症状

  - disease: dis_079
    target: dis_002
    feature: 肺动脉高压有呼吸困难和晕厥，左心衰有肺水肿和咳嗽，心脏超声可鉴别

  - disease: dis_080
    target: dis_007
    feature: 膀胱炎有尿频尿痛和脓尿，FLUTD有尿道阻塞但无菌尿，尿培养可确诊

  - disease: dis_081
    target: dis_068
    feature: 肾结石有血尿和腰痛，尿石症下尿路结石有排尿障碍，影像可定位

  - disease: dis_082
    target: dis_035
    feature: 骨肉瘤有进行性跛行和骨痛，骨关节炎活动后加重，X光骨肉瘤有骨质溶解和新骨形成

  - disease: dis_083
    target: dis_043
    feature: 黑色素瘤有黑色结节，肥大细胞瘤有溃疡和组胺释放症状，病理可确诊

  - disease: dis_084
    target: dis_005
    feature: 弓形虫病有神经症状和眼部病变，AKI有肾功能异常和氮质血症，抗体检测可确诊

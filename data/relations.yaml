# 鉴别诊断关联

# 鉴别诊断关联
# 格式：疾病A -> 疾病B：鉴别要点
ddx:
  - disease: dis_001
    target: dis_002
    feature: 肺炎有发热+湿咳，心衰有心脏杂音+奔马律

  - disease: dis_002
    target: dis_014
    feature: 心衰MMVD有瓣膜杂音，DCM有心室扩张+心律失常

  - disease: dis_003
    target: dis_001
    feature: 哮喘有可逆性气流受限+嗜酸性粒细胞增多

  - disease: dis_005
    target: dis_006
    feature: AKI起病急+肾脏可增大，CKD病程长+肾脏缩小

  - disease: dis_009
    target: dis_010
    feature: 胰腺炎有剧烈腹痛+fPLI升高，胃肠炎腹痛轻且无酶升高

  - disease: dis_009
    target: dis_011
    feature: 胰腺炎渐进性腹痛+酶升高，异物有吞食史+影像可见异物

  - disease: dis_017
    target: dis_018
    feature: 糖尿病血糖高+尿糖，库欣有皮肤变薄+ALP升高

  - disease: dis_017
    target: dis_019
    feature: 糖尿病血糖高但T4正常，甲亢T4升高但血糖可正常

  - disease: dis_019
    target: dis_006
    feature: 甲亢T4升高+多食体重下降，CKD有氮质血症+尿比重低

  - disease: dis_015
    target: dis_016
    feature: HCM有心室肥厚+左房扩大，心包积液有心包液暗区

  - disease: dis_025
    target: dis_027
    feature: 细小有严重出血性肠炎+白细胞↓↓，猫泛白细胞减少类似但感染猫细小病毒

  - disease: dis_007
    target: dis_008
    feature: UTI有菌尿+脓尿，FLUTD可能无菌尿

  - disease: dis_010
    target: dis_013
    feature: 胃肠炎急性起病且自限，IBD慢性持续性+组织学炎症

  - disease: dis_012
    target: dis_028
    feature: 肝衰竭有凝血障碍+低白蛋白，FIP有渗出液+球蛋白升高

  - disease: dis_021
    target: dis_005
    feature: 乙二醇中毒有草酸钙结晶+阴离子间隙升高，其他AKI无此特征

  - disease: dis_051
    target: dis_031
    feature: 前庭疾病有头歪+眼震+共济失调，癫痫发作有意识丧失+抽搐

  - disease: dis_052
    target: dis_037
    feature: 蠕形螨有毛囊性脱毛+油腻性鳞屑，脓皮症以脓疱为主

  - disease: dis_052
    target: dis_045
    feature: 蠕形螨伴继发脓皮症时需与异位性皮炎鉴别，螨虫感染有毛囊堵塞

  - disease: dis_053
    target: dis_054
    feature: FeLV+与FIV+均可致免疫抑制，但FeLV+常见淋巴增殖性肿瘤和骨髓抑制，PCR和ELISA可确诊

  - disease: dis_054
    target: dis_028
    feature: FIV慢性免疫抑制可致机会性感染和消瘦，FIP有渗出液+高球蛋白血症可鉴别

  - disease: dis_055
    target: dis_025
    feature: 钩虫病有血便+低蛋白血症+贫血，细小病毒有严重出血性肠炎+白细胞↓↓，粪便镜检可见虫卵

  - disease: dis_056
    target: dis_010
    feature: 球虫/贾第虫病有水样腹泻+脂肪泻，胃肠炎以呕吐为主，粪便浮聚法或PCR可确诊

  - disease: dis_057
    target: dis_022
    feature: 有机磷中毒有流涎+瞳孔缩小+支气管痉挛，士的宁中毒以强直惊厥为主无流涎

  - disease: dis_058
    target: dis_026
    feature: 士的宁中毒强直惊厥为特异症状，脑炎有意识障碍和灶性神经症状

  - disease: dis_059
    target: dis_031
    feature: 脑炎/脑膜炎有发热+颈背强直+惊厥，癫痫发作无发热且惊厥后恢复快

  - disease: dis_060
    target: dis_040
    feature: 角膜坏死有棕色/黑色腐骨灶，角膜溃疡为浅表缺损无变色

  - disease: dis_061
    target: dis_039
    feature: 结膜炎/干眼症有眼红+分泌物+干燥感，青光眼有眼压升高和角膜混浊

  - disease: dis_062
    target: dis_002
    feature: 心律失常有心电图异常和节律紊乱，心衰有心脏杂音和心脏扩大，超声心动可鉴别

  - disease: dis_063
    target: dis_028
    feature: 胆管肝炎有肝酶升高+胆红素升高，FIP有渗出液+高球蛋白，可做胆汁培养鉴别

  - disease: dis_064
    target: dis_033
    feature: 骨髓疾病有全系血细胞减少，再障骨髓活检示脂肪化，IMHA有Coombs阳性且网织红细胞不低

  - disease: dis_065
    target: dis_026
    feature: 癫痫持续状态抽搐超过5分钟或反复发作，普通癫痫发作短暂可自行停止

  - disease: dis_066
    target: dis_006
    feature: Addison病有高钾低钠血症和肾上腺皮质功能低下，CKD有氮质血症和等渗尿

  - disease: dis_067
    target: dis_009
    feature: 胃溃疡有黑便和吐血，胰腺炎有剧烈腹痛和fPLI升高

  - disease: dis_068
    target: dis_007
    feature: 尿石症有结石相关的排尿障碍和血尿，UTI有菌尿和脓尿，影像可确诊结石

  - disease: dis_069
    target: dis_035
